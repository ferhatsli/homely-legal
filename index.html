<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homely Legal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111;
      --panel: #171717;
      --text: #f5f5f5;
      --muted: #b9b9b9;
      --border: #2a2a2a;
      --button-bg: #f5f5f5;
      --button-text: #111;
      --button-border: #f5f5f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      padding: 20px;
    }

    main {
      width: min(100%, 800px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-align: center;
      padding: 42px 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4.2vw, 2.3rem);
      line-height: 1.25;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    nav {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-block;
      min-width: 170px;
      padding: 12px 18px;
      border: 1px solid var(--button-border);
      border-radius: 10px;
      background: var(--button-bg);
      color: var(--button-text);
      text-decoration: none;
      font-weight: 600;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      opacity: 0.94;
    }
  </style>
</head>
<body>
  <main>
    <h1>Homely Legal</h1>
    <p>Official legal documents for the Homely iOS app.</p>
    <nav aria-label="Legal document links">
      <a class="button" href="privacy-policy.html">Privacy Policy</a>
      <a class="button" href="terms-of-use.html">Terms of Use</a>
      <a class="button" href="support.html">Support</a>
    </nav>
  </main>
</body>
</html>
