<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homely Support</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111;
      --panel: #171717;
      --text: #f5f5f5;
      --muted: #b9b9b9;
      --border: #2a2a2a;
      --link: #e5e5e5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.7;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }

    article {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 22px;
    }

    h1,
    h2 {
      line-height: 1.35;
      margin: 1.35em 0 0.6em;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(1.65rem, 4vw, 2rem);
    }

    h2 {
      font-size: clamp(1.15rem, 3vw, 1.35rem);
    }

    p,
    ul {
      margin: 0 0 0.9em;
    }

    ul {
      padding-left: 1.2rem;
    }

    li {
      margin: 0.3em 0;
    }

    a {
      color: var(--link);
    }

    .top-link {
      display: inline-block;
      margin-bottom: 16px;
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    .top-link:hover {
      border-color: var(--link);
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 480px) {
      article {
        padding: 22px 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <a class="top-link" href="index.html">Legal Home</a>
    <article>
      <h1>Support</h1>
      <p>If you need help with the Homely app, contact our support team at <a href="mailto:support@homely.app">support@homely.app</a>.</p>
      <p class="muted">Please include enough detail so we can help quickly.</p>

      <h2>Helpful Details</h2>
      <ul>
        <li>Your device model and iOS version</li>
        <li>Your app version</li>
        <li>A short description of the issue</li>
      </ul>
    </article>
  </main>
</body>
</html>
